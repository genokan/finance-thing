version: 2
updates:
  # npm workspaces share the root lockfile.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  # Base image bumps (node:22-slim digests / point releases).
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
