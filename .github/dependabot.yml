version: 2
updates:
  # npm workspaces share the root lockfile.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  # Base image bumps. Node majors are ignored on purpose: we track the active
  # LTS line (currently 24) and move majors deliberately — Dependabot would
  # otherwise propose odd/current non-LTS releases.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    ignore:
      - dependency-name: node
        update-types: ["version-update:semver-major"]
