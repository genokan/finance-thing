name: CI

# Validation only — nothing is published from CI. Images reach GHCR solely
# via the Release workflow (release.yml) when a GitHub release is published.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Full-history secret scan. Config in .gitleaks.toml (repo root).
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Gitleaks
        run: >
          docker run --rm -v "$PWD:/repo"
          zricethezav/gitleaks:latest
          git /repo --redact --exit-code 1

  check:
    runs-on: ubuntu-latest
    env:
      # prisma generate loads prisma.config.ts, which resolves DATABASE_URL;
      # no connection is made — any well-formed value satisfies it.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:generate -w server
      - run: npm run typecheck
      - run: npm run test:coverage --workspaces --if-present
      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: |
            server/coverage
            client/coverage
          if-no-files-found: ignore
          retention-days: 14

  # Prove the image builds and passes the vulnerability gate — never pushed.
  image:
    needs: [secrets, check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build for scan (amd64)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: finance-thing:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: finance-thing:ci
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
