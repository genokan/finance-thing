name: Release

# Publishing is a deliberate act: create a GitHub release (tag like v0.2.0)
# and this builds the multi-arch image, gates it on Trivy, and pushes it to
# GHCR and Docker Hub with {semver, latest} tags — plus the scan report is
# attached to the release and the Docker Hub overview is synced from the
# README. workflow_dispatch is the manual escape hatch — it publishes
# dev + dev-<package.json version> tags, never latest.
#
# Docker Hub auth: requires repo secrets DOCKERHUB_USERNAME and
# DOCKERHUB_TOKEN (an access token from hub.docker.com → Account Settings →
# Personal access tokens, Read & Write scope). The GitHub-linked Docker
# login only covers the website, not registry pushes.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: docker.io/genokant/finance-thing

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload the scan report as a release asset
      packages: write
      security-events: write # SARIF upload to the Security tab
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read package version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            ${{ env.IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          # Releases get semver + latest; manual dispatches get dev tags.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=dev,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=dev-${{ steps.version.outputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}

      # Gate on the scan before anything is published.
      - name: Build for scan (amd64)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:scan
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # Publish the full results: SARIF to the Security tab, and the
      # human-readable report attached to the GitHub release.
      - name: Trivy SARIF report
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:scan
          format: sarif
          output: trivy-image.sarif
          exit-code: '0'
        env:
          TRIVY_SKIP_DB_UPDATE: 'true'
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-release
      - name: Trivy full report (release asset)
        if: github.event_name == 'release'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:scan
          format: table
          output: trivy-scan-report.txt
          exit-code: '0'
        env:
          TRIVY_SKIP_DB_UPDATE: 'true'
      - name: Attach scan report to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG" trivy-scan-report.txt --clobber

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keep the Docker Hub overview in sync with the README on releases.
      # Note: requires the PAT to have Read, Write & Delete scope — Docker
      # Hub rejects description updates from narrower tokens.
      - name: Sync Docker Hub description
        if: github.event_name == 'release'
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: genokant/finance-thing
          short-description: Self-hosted long-term financial planning — projections, what-ifs, and scenario modeling.
          enable-url-completion: true
